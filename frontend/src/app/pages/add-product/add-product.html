<div class="container">

    <div class="card">

        <h2>➕ Add Product</h2>

        <label>SKU</label>

        <input
            type="text"
            [(ngModel)]="product.sku">

        <label>Product Name</label>

        <input
            type="text"
            [(ngModel)]="product.name">

        <label>Reorder Level</label>

        <input
            type="number"
            [(ngModel)]="product.reorder_level">

        <button (click)="saveProduct()">
            Save Product
        </button>

        <a routerLink="/dashboard" class="back">
            ← Back to Dashboard
        </a>

    </div>

</div>
